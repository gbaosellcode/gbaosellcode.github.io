<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dự đoán điểm thi 🤯</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #fdfcfb, #e2d1c3);
      color: #333;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #fff5f8;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 20px;
      color: #ff5f8d;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: 2px solid #ffb3c1;
      background-color: #fff0f5;
      font-size: 16px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #ff80ab;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .result {
      margin-top: 25px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #e91e63;
      animation: none;
      opacity: 0;
    }

    .animate-score {
      animation: popUp 0.6s ease-out forwards;
    }

    @keyframes popUp {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      60% {
        transform: scale(1.2);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .shake {
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .message {
      margin-top: 10px;
      text-align: center;
      font-size: 16px;
      color: #555;
      font-style: italic;
    }

    .author {
      margin-top: 30px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
      font-style: italic;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📚 Dự đoán điểm thi✨</h2>
    <label for="subject">Môn gì đây nè?</label>
    <select id="subject">
      <option value="">-- Chọn lẹ đi bạn êi --</option>
      <option value="Toán">Toán</option>
      <option value="Lí">Lí</option>
      <option value="Hóa">Hóa</option>
      <option value="Văn">Văn</option>
      <option value="Sử">Sử</option>
      <option value="Địa">Địa</option>
      <option value="Anh">Anh</option>
      <option value="Tin">Tin</option>
      <option value="Sinh">Sinh</option>
    </select>
    <button onclick="predictScore()">🔮 Đoán cái coi!</button>
    <div class="result" id="result"></div>
    <div class="message" id="message"></div>
    <div class="author">~ https://gbaosellcode.*✨</div>
  </div>

  <script>
    function predictScore() {
      const subject = document.getElementById("subject").value;
      const resultDiv = document.getElementById("result");
      const messageDiv = document.getElementById("message");

      if (!subject) {
        resultDiv.textContent = "🚨 Bạn quên chọn môn rồi á!";
        resultDiv.classList.remove("animate-score", "shake");
        resultDiv.style.opacity = 1;
        messageDiv.textContent = "";
        return;
      }

      const score = (Math.random() * 10).toFixed(1);
      const funnyMsgs = [
        "📈 Lên luôn bạn ơiii!",
        "🔥 Năng lượng học tập: max ping!",
        "💀 Cười trừ... cố lên nha",
        "🎯 Còn 0.1 nữa là thần đồng!",
        "💤 Mơ cũng chưa được điểm này :v",
        "💥 Boom! Điểm cao quá trời!",
        "💡 Bạn có tố chất học bá đó!",
        "🥲 Nhìn vậy thôi chứ chưa chắc nha!",
        "🫠 Điểm này hợp vibe thi thật ghê!",
        "🪄 Đây là phép màu? Không nha, do bạn đó!"
      ];
      const msg = funnyMsgs[Math.floor(Math.random() * funnyMsgs.length)];

      resultDiv.textContent = `Môn ${subject}: ${score} điểm`;
      resultDiv.classList.remove("animate-score", "shake");
      void resultDiv.offsetWidth;

      resultDiv.classList.add("animate-score");
      if (score >= 9) {
        resultDiv.classList.add("shake");
      }

      resultDiv.style.opacity = 1;
      messageDiv.textContent = msg;
    }
  </script>
</body>
</html>
